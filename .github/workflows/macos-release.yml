name: macOS Release Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release macOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies (FFmpeg)
        run: brew install ffmpeg

      - name: Build Python Backend
        run: |
          cd backend
          bash build.sh

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Build Flutter macOS App
        run: flutter build macos --release

      - name: Bundle Backend into App
        run: |
          # Find the generated .app bundle
          APP_PATH=$(find build/macos/Build/Products/Release -name "*.app" | head -n 1)
          echo "Found app at: $APP_PATH"
          
          # Create backend directory inside the .app bundle's Resources folder
          mkdir -p "$APP_PATH/Contents/Resources/backend"
          
          # Copy the PyInstaller executable into the bundle
          cp backend/dist/vocalizeai_backend "$APP_PATH/Contents/Resources/backend/"

      - name: Compress App Bundle
        run: |
          APP_PATH=$(find build/macos/Build/Products/Release -name "*.app" | head -n 1)
          APP_DIR=$(dirname "$APP_PATH")
          APP_NAME=$(basename "$APP_PATH")
          
          # Change to the directory containing the .app to zip it cleanly
          cd "$APP_DIR"
          zip -r "VocalizeAI-macOS.zip" "$APP_NAME"
          
          # Move it to workspace root for uploading
          mv "VocalizeAI-macOS.zip" $GITHUB_WORKSPACE/

      - name: Delete Old Latest Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Deleting old latest release and tag if they exist..."
          gh release delete latest --cleanup-tag -y || true
          git push --delete origin latest || true

      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "VocalizeAI Latest (macOS)"
          body: "Bản build tự động mới nhất từ nhánh `main`.\nĐược cập nhật vào: ${{ github.event.head_commit.timestamp }}"
          files: VocalizeAI-macOS.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
