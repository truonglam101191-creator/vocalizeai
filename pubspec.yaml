name: vocalizeai
description: "MP3 → SRT → WAV offline pipeline powered by Whisper + Piper TTS"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # File operations
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  path: ^1.9.0

  # Networking
  http: ^1.2.1

  # Audio playback
  audioplayers: ^6.1.0
  argos_translator_offline: ^1.2.0

  # Architecture
  flutter_riverpod: ^2.4.9
  go_router: ^13.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.jpg"
  macos:
    generate: true
    image_path: "assets/images/logo.jpg"
  windows:
    generate: true
    image_path: "assets/images/logo.jpg"
  linux:
    generate: true
    image_path: "assets/images/logo.jpg"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
